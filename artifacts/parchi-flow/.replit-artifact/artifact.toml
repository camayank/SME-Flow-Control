kind = "web"
previewPath = "/"
title = "ParchiFlow"
version = "1.0.0"
id = "artifacts/parchi-flow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24924

[services.development]
run = "pnpm --filter @workspace/parchi-flow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/parchi-flow", "run", "build" ]
publicDir = "artifacts/parchi-flow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24924"
BASE_PATH = "/"
