openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ParchiFlow - Universal SME Ledger Intelligence & Collection Automation OS
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: business
  - name: parties
  - name: parchi
  - name: ledger
  - name: money-events
  - name: outstandings
  - name: payments
  - name: reconciliation
  - name: follow-ups
  - name: reminders
  - name: import
  - name: connectors
  - name: data-sources
  - name: reports
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to mobile number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpBody"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and get session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpBody"
      responses:
        "200":
          description: Auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # BUSINESS
  /business:
    get:
      operationId: getBusiness
      tags: [business]
      summary: Get business profile
      responses:
        "200":
          description: Business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    post:
      operationId: createBusiness
      tags: [business]
      summary: Create business profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessBody"
      responses:
        "201":
          description: Created business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    put:
      operationId: updateBusiness
      tags: [business]
      summary: Update business profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessBody"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  # PARTIES
  /parties:
    get:
      operationId: getParties
      tags: [parties]
      summary: List all parties
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: balance_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of parties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Party"
    post:
      operationId: createParty
      tags: [parties]
      summary: Create a party
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartyBody"
      responses:
        "201":
          description: Created party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"

  /parties/duplicates:
    get:
      operationId: getPartyDuplicates
      tags: [parties]
      summary: Get potential duplicate parties
      responses:
        "200":
          description: Duplicate party groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DuplicatePartyGroup"

  /parties/merge:
    post:
      operationId: mergeParties
      tags: [parties]
      summary: Merge duplicate parties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergePartiesBody"
      responses:
        "200":
          description: Merged party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"

  /parties/{id}:
    get:
      operationId: getParty
      tags: [parties]
      summary: Get a party by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
    put:
      operationId: updateParty
      tags: [parties]
      summary: Update a party
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartyBody"
      responses:
        "200":
          description: Updated party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"

  /parties/{id}/ledger:
    get:
      operationId: getPartyLedger
      tags: [parties]
      summary: Get ledger for a party
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Party ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyLedger"

  # PARCHI
  /parchi/parse:
    post:
      operationId: parseParchi
      tags: [parchi]
      summary: Parse a parchi text entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseParchiBody"
      responses:
        "200":
          description: Parsed parchi result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedParchi"

  /parchi/save:
    post:
      operationId: saveParchi
      tags: [parchi]
      summary: Save a confirmed parchi entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveParchiBody"
      responses:
        "201":
          description: Saved parchi result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveParchiResponse"

  # LEDGER
  /ledger:
    get:
      operationId: getLedgerEntries
      tags: [ledger]
      summary: Get ledger entries
      parameters:
        - name: party_id
          in: query
          schema:
            type: integer
        - name: entry_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LedgerEntry"
    post:
      operationId: createLedgerEntry
      tags: [ledger]
      summary: Create a ledger entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLedgerEntryBody"
      responses:
        "201":
          description: Created ledger entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"

  /ledger/{id}:
    get:
      operationId: getLedgerEntry
      tags: [ledger]
      summary: Get a ledger entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ledger entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"

  # MONEY EVENTS
  /money-events:
    get:
      operationId: getMoneyEvents
      tags: [money-events]
      summary: Get money events
      parameters:
        - name: party_id
          in: query
          schema:
            type: integer
        - name: event_type
          in: query
          schema:
            type: string
        - name: reconciliation_status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Money events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MoneyEvent"
    post:
      operationId: createMoneyEvent
      tags: [money-events]
      summary: Create a money event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMoneyEventBody"
      responses:
        "201":
          description: Created money event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoneyEvent"

  /money-events/{id}:
    get:
      operationId: getMoneyEvent
      tags: [money-events]
      summary: Get a money event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Money event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoneyEvent"

  # OUTSTANDINGS
  /outstandings:
    get:
      operationId: getOutstandings
      tags: [outstandings]
      summary: Get outstandings
      parameters:
        - name: party_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: aging_bucket
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Outstandings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Outstanding"

  /outstandings/aging:
    get:
      operationId: getOutstandingsAging
      tags: [outstandings]
      summary: Get outstandings grouped by aging bucket
      responses:
        "200":
          description: Aging summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgingSummary"

  /outstandings/{id}/status:
    put:
      operationId: updateOutstandingStatus
      tags: [outstandings]
      summary: Update outstanding status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOutstandingStatusBody"
      responses:
        "200":
          description: Updated outstanding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outstanding"

  # PAYMENTS
  /payments:
    get:
      operationId: getPayments
      tags: [payments]
      summary: Get payments
      parameters:
        - name: party_id
          in: query
          schema:
            type: integer
        - name: match_status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: recordPayment
      tags: [payments]
      summary: Record a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPaymentBody"
      responses:
        "201":
          description: Recorded payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}/allocate:
    post:
      operationId: allocatePayment
      tags: [payments]
      summary: Allocate payment to outstanding(s)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllocatePaymentBody"
      responses:
        "200":
          description: Allocation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # RECONCILIATION
  /reconciliation:
    get:
      operationId: getReconciliationQueue
      tags: [reconciliation]
      summary: Get reconciliation queue
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: issue_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Reconciliation items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReconciliationItem"

  /reconciliation/summary:
    get:
      operationId: getReconciliationSummary
      tags: [reconciliation]
      summary: Get reconciliation summary counts
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationSummary"

  /reconciliation/{id}/confirm:
    post:
      operationId: confirmReconciliation
      tags: [reconciliation]
      summary: Confirm a reconciliation match
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconciliationActionBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /reconciliation/{id}/merge:
    post:
      operationId: mergeReconciliation
      tags: [reconciliation]
      summary: Merge duplicate in reconciliation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconciliationActionBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /reconciliation/{id}/assign-party:
    post:
      operationId: assignPartyReconciliation
      tags: [reconciliation]
      summary: Assign party to unmatched item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignPartyBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /reconciliation/{id}/mark-dispute:
    post:
      operationId: markDisputeReconciliation
      tags: [reconciliation]
      summary: Mark item as disputed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconciliationActionBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /reconciliation/{id}/ignore:
    post:
      operationId: ignoreReconciliation
      tags: [reconciliation]
      summary: Ignore reconciliation item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconciliationActionBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /reconciliation/{id}/keep-separate:
    post:
      operationId: keepSeparateReconciliation
      tags: [reconciliation]
      summary: Keep items separate (not duplicates)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconciliationActionBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # FOLLOW-UPS
  /follow-ups:
    get:
      operationId: getFollowUps
      tags: [follow-ups]
      summary: Get follow-ups
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: party_id
          in: query
          schema:
            type: integer
        - name: tab
          in: query
          schema:
            type: string
            description: "due_today | overdue | promised_today | high_priority | disputed | all"
      responses:
        "200":
          description: Follow-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FollowUp"
    post:
      operationId: createFollowUp
      tags: [follow-ups]
      summary: Create a follow-up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFollowUpBody"
      responses:
        "201":
          description: Created follow-up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUp"

  /follow-ups/{id}:
    put:
      operationId: updateFollowUp
      tags: [follow-ups]
      summary: Update a follow-up
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFollowUpBody"
      responses:
        "200":
          description: Updated follow-up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUp"

  # REMINDERS
  /reminders/generate:
    post:
      operationId: generateReminder
      tags: [reminders]
      summary: Generate a WhatsApp reminder message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateReminderBody"
      responses:
        "200":
          description: Generated reminder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderMessage"

  /reminders/log:
    post:
      operationId: logReminder
      tags: [reminders]
      summary: Log a sent reminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogReminderBody"
      responses:
        "201":
          description: Logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # DATA SOURCES
  /data-sources:
    get:
      operationId: getDataSources
      tags: [data-sources]
      summary: Get data sources
      responses:
        "200":
          description: Data sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DataSource"
    post:
      operationId: createDataSource
      tags: [data-sources]
      summary: Create a data source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataSourceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSource"

  /data-sources/{id}:
    put:
      operationId: updateDataSource
      tags: [data-sources]
      summary: Update a data source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataSourceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSource"

  /data-sources/{id}/test:
    post:
      operationId: testDataSource
      tags: [data-sources]
      summary: Test a data source connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"

  /data-sources/{id}/sync:
    post:
      operationId: syncDataSource
      tags: [data-sources]
      summary: Sync a data source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  # IMPORT
  /import/upload:
    post:
      operationId: uploadImportFile
      tags: [import]
      summary: Upload a file for import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadImportBody"
      responses:
        "200":
          description: Upload result with column detection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadImportResponse"

  /import/map-columns:
    post:
      operationId: mapImportColumns
      tags: [import]
      summary: Map columns for import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapColumnsBody"
      responses:
        "200":
          description: Preview with mapped columns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreview"

  /import/confirm:
    post:
      operationId: confirmImport
      tags: [import]
      summary: Confirm and run import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmImportBody"
      responses:
        "200":
          description: Import job result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobResult"

  /import/jobs:
    get:
      operationId: getImportJobs
      tags: [import]
      summary: Get import job history
      responses:
        "200":
          description: Import jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportJob"

  /import/rollback/{jobId}:
    post:
      operationId: rollbackImport
      tags: [import]
      summary: Rollback an import job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rollback result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # CONNECTORS
  /connectors/tally/test:
    post:
      operationId: testTallyConnector
      tags: [connectors]
      summary: Test Tally connector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TallyConfigBody"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"

  /connectors/tally/sync:
    post:
      operationId: syncTallyConnector
      tags: [connectors]
      summary: Sync from Tally (mock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TallyConfigBody"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /connectors/busy/test:
    post:
      operationId: testBusyConnector
      tags: [connectors]
      summary: Test BUSY connector
      requestBody:
        required: true
        content:
          application/json:
            schema:
