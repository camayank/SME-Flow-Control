          type: string
          nullable: true
        upiId:
          type: string
          nullable: true
        preferredLanguage:
          type: string
        existingSystem:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, userId, businessName, businessType, preferredLanguage, createdAt]

    CreateBusinessBody:
