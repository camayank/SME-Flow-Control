          type: string
          nullable: true
        email:
          type: string
          nullable: true
        gstin:
          type: string
          nullable: true
        type:
          type: string
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        currentBalance:
          type: number
        balanceType:
          type: string
        openingBalance:
          type: number
        openingBalanceType:
          type: string
        riskScore:
          type: number
          nullable: true
        sourceType:
          type: string
          nullable: true
        createdAt:
          type: string
