components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    # AUTH SCHEMAS
    SendOtpBody:
      type: object
      properties:
        mobile:
          type: string
      required: [mobile]

    SendOtpResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        mobile:
          type: string
      required: [success, message, mobile]

    VerifyOtpBody:
      type: object
      properties:
        mobile:
          type: string
        otp:
          type: string
      required: [mobile, otp]

    AuthResponse:
